version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecotrack_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - postgres

  webserver:
    image: nginx:latest
    container_name: ecotrack_nginx
    ports:
      - "8003:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:15
    container_name: ecotrack_postgres
    restart: always
    environment:
      POSTGRES_DB: eco_track_docker
      POSTGRES_USER: postgresdocker
      POSTGRES_PASSWORD: secretdocker
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: